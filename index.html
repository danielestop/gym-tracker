<style>

    font-family: 'Outfit', 'Segoe UI', sans-serif;

  }

  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  #app { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
  textarea { font-family: 'JetBrains Mono', monospace; }
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.80); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-box {
    background: #14141e; border: 1px solid #333; border-radius: 16px;
    padding: 24px; max-width: 360px; width: 100%; text-align: center;
  }
  .modal-box h3 { color: #e0e0e0; margin-bottom: 12px; font-size: 16px; }

    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .img-btn {
    background: none; border: 1px solid #333; border-radius: 6px;
    color: #888; font-size: 16px; cursor: pointer; padding: 2px 6px;
    line-height: 1; transition: all 0.2s;
  }
  .img-btn:active { background: #00e67622; border-color: #00e676; color: #00e676; }
  .sync-bar {
    display: flex; align-items: center; gap: 8px; padding: 6px 16px;
    background: #0d0d15; border-bottom: 1px solid #1a1a2e; font-size: 11px;
  }

  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, useCallback = React.useCallback;
var e = React.createElement;

var STORAGE_KEY = "gym-tracker-data";
var CLIENT_ID = "32657493722-9dig78q9ah1ecjk98hb8kjke5bb2ckv9.apps.googleusercontent.com";
var SCOPES = "https://www.googleapis.com/auth/drive.file";
var BACKUP_FILENAME = "gym-tracker-backup.json";

// ── Exercise helpers ──
function exObj(ex) {
  if (typeof ex === "string") return { name: ex, image: "" };
  return { name: ex.name || "", image: ex.image || "" };
}

var defaultData = {
  days: {
    A: { name: "Giorno A", exercises: [] },
    B: { name: "Giorno B", exercises: [] },
    C: { name: "Giorno C", exercises: [] },
  },
  logs: [],
};

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(ex) {}
  return JSON.parse(JSON.stringify(defaultData));
}

function saveData(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(ex) {}
}

// ══════════════════════════════════════
// Google Drive Integration
// ══════════════════════════════════════
var gDrive = {
  tokenClient: null,
  accessToken: null,
  initialized: false,

  init: function(onReady) {
    if (gDrive.initialized) return;
    var check = setInterval(function() {
      if (window.google && google.accounts && google.accounts.oauth2) {
        clearInterval(check);
        gDrive.tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: function() {} // overridden per-call
        });
        gDrive.initialized = true;
        // Check if we have a saved token
        var saved = sessionStorage.getItem("gym_gdrive_token");
        if (saved) {
          gDrive.accessToken = saved;
        }
        if (onReady) onReady();
      }
    }, 200);
  },

  authorize: function(callback) {
    if (!gDrive.tokenClient) { callback(new Error("Google non caricato")); return; }
    gDrive.tokenClient.callback = function(resp) {
      if (resp.error) { callback(new Error(resp.error)); return; }
      gDrive.accessToken = resp.access_token;
      sessionStorage.setItem("gym_gdrive_token", resp.access_token);
      callback(null);
    };
    if (gDrive.accessToken) {
      gDrive.tokenClient.requestAccessToken({ prompt: "" });
    } else {
      gDrive.tokenClient.requestAccessToken({ prompt: "consent" });
    }
  },

  findFile: function(callback) {
    fetch("https://www.googleapis.com/drive/v3/files?q=name%3D%27" + BACKUP_FILENAME + "%27+and+trashed%3Dfalse&spaces=drive&fields=files(id,name,modifiedTime)", {
      headers: { "Authorization": "Bearer " + gDrive.accessToken }
    })
    .then(function(r) {
      if (r.status === 401) { gDrive.accessToken = null; sessionStorage.removeItem("gym_gdrive_token"); callback(new Error("Token scaduto")); return; }
      return r.json();
    })
    .then(function(data) {
      if (!data) return;
      if (data.files && data.files.length > 0) {
        callback(null, data.files[0]);
      } else {
        callback(null, null);
      }
    })
    .catch(function(err) { callback(err); });
  },

  uploadFile: function(content, fileId, callback) {
    var metadata = { name: BACKUP_FILENAME, mimeType: "application/json" };
    var boundary = "gym_tracker_boundary";
    var body = "--" + boundary + "\r\n" +
      "Content-Type: application/json; charset=UTF-8\r\n\r\n" +
      JSON.stringify(metadata) + "\r\n" +
      "--" + boundary + "\r\n" +
      "Content-Type: application/json\r\n\r\n" +
      JSON.stringify(content, null, 2) + "\r\n" +
      "--" + boundary + "--";

    var url = fileId
      ? "https://www.googleapis.com/upload/drive/v3/files/" + fileId + "?uploadType=multipart"
      : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";

    fetch(url, {
      method: fileId ? "PATCH" : "POST",
      headers: {
        "Authorization": "Bearer " + gDrive.accessToken,
        "Content-Type": "multipart/related; boundary=" + boundary
      },
      body: body
    })
    .then(function(r) {
      if (r.status === 401) { gDrive.accessToken = null; sessionStorage.removeItem("gym_gdrive_token"); callback(new Error("Token scaduto")); return; }
      return r.json();
    })
    .then(function(data) {
      if (data && data.id) callback(null, data);
      else callback(new Error("Upload fallito"));
    })
    .catch(function(err) { callback(err); });
  },

  downloadFile: function(fileId, callback) {
    fetch("https://www.googleapis.com/drive/v3/files/" + fileId + "?alt=media", {
      headers: { "Authorization": "Bearer " + gDrive.accessToken }
    })
    .then(function(r) {
      if (r.status === 401) { gDrive.accessToken = null; sessionStorage.removeItem("gym_gdrive_token"); callback(new Error("Token scaduto")); return; }
      return r.json();
    })
    .then(function(data) {
      if (data) callback(null, data);
    })
    .catch(function(err) { callback(err); });
  },

  // High-level: save data to Drive
  save: function(data, callback) {
    function doSave() {
      gDrive.findFile(function(err, file) {
        if (err) { callback(err); return; }
        gDrive.uploadFile(data, file ? file.id : null, function(err2) {
          if (err2) callback(err2);
          else callback(null);
        });
      });
    }
    if (!gDrive.accessToken) {
      gDrive.authorize(function(err) {
        if (err) { callback(err); return; }
        doSave();
      });
    } else {
      doSave();
    }
  },

  // High-level: load data from Drive
  load: function(callback) {
    function doLoad() {
      gDrive.findFile(function(err, file) {
        if (err) { callback(err); return; }
        if (!file) { callback(null, null); return; } // No backup yet
        gDrive.downloadFile(file.id, function(err2, data) {
          if (err2) callback(err2);
          else callback(null, data);
        });
      });
    }
    if (!gDrive.accessToken) {
      gDrive.authorize(function(err) {
        if (err) { callback(err); return; }
        doLoad();
      });
    } else {
      doLoad();
    }
  }
};

// ── Timer ──
function useTimer(initialSeconds) {
  var _to = useState(initialSeconds), total = _to[0], setTotal = _to[1];
  var _re = useState(initialSeconds), remaining = _re[0], setRemaining = _re[1];
  var _ru = useState(false), running = _ru[0], setRunning = _ru[1];
  // endTimeRef stores the absolute timestamp when the timer should end
  var endTimeRef = useRef(null);
  var intervalRef = useRef(null);
  var audioCtx = useRef(null);
  var beepedRef = useRef(false);

  var beep = useCallback(function() {
    try {
      if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
      var ctx = audioCtx.current;
      var osc = ctx.createOscillator(); var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; gain.gain.value = 0.3;
      osc.start(); osc.stop(ctx.currentTime + 0.25);
      setTimeout(function() {
        var o2 = ctx.createOscillator(); var g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.frequency.value = 1100; g2.gain.value = 0.3;
        o2.start(); o2.stop(ctx.currentTime + 0.35);
      }, 300);
    } catch(ex) {}
  }, []);

  // Recalculate remaining based on real elapsed time
  function tick() {
    if (!endTimeRef.current) return;
    var ms = endTimeRef.current - Date.now();
    var s = Math.max(0, Math.ceil(ms / 1000));
    setRemaining(s);
    if (s <= 0) {
      if (!beepedRef.current) {
        beepedRef.current = true;
        beep();
      }
      setRunning(false);
      endTimeRef.current = null;
      clearInterval(intervalRef.current);
    }
  }

  useEffect(function() {
    if (running) {
      intervalRef.current = setInterval(tick, 250);
      // Also recalculate immediately on visibility change (when phone wakes)
      var onVisibility = function() {
        if (document.visibilityState === "visible") tick();
      };
      document.addEventListener("visibilitychange", onVisibility);
      return function() {
        clearInterval(intervalRef.current);
        document.removeEventListener("visibilitychange", onVisibility);
      };
    }
    return function() { clearInterval(intervalRef.current); };
  }, [running]);

  return {
    total: total, remaining: remaining, running: running,
    start: function() {
      if (remaining > 0) {
        endTimeRef.current = Date.now() + remaining * 1000;
        beepedRef.current = false;
        setRunning(true);
      }
    },
    pause: function() {
      setRunning(false);
      // Capture remaining at pause time
      if (endTimeRef.current) {
        var ms = endTimeRef.current - Date.now();
        setRemaining(Math.max(0, Math.ceil(ms / 1000)));
      }
      endTimeRef.current = null;
    },
    reset: function() {
      setRunning(false);
      endTimeRef.current = null;
      beepedRef.current = false;
      setRemaining(total);
    },
    setTime: function(s) {
      setTotal(s); setRemaining(s); setRunning(false);
      endTimeRef.current = null;
      beepedRef.current = false;
    }
  };
}

// ── Styles ──
var inputStyle = {
  background: "#1a1a2e", border: "1px solid #333", borderRadius: 8,
  padding: "8px 10px", color: "#e0e0e0", fontSize: 14, outline: "none", fontFamily: "inherit"
};
function btnStyle(bg, color) {

}

// ── Image Overlay (hybrid) ──
function ImageOverlay(props) {
  if (!props.src) return null;
  var _st = useState("loading"), status = _st[0], setStatus = _st[1];

  } else {
    content = e("div", { style: { textAlign: "center", padding: 20 }, onClick: function(ev) { ev.stopPropagation(); } },
      e("div", { style: { fontSize: 36, marginBottom: 12 } }, "\uD83D\uDDBC\uFE0F"),
      e("p", { style: { color: "#888", fontSize: 14, marginBottom: 16 } }, "Immagine non disponibile"),
      e("a", {
        href: searchUrl, target: "_blank", rel: "noopener noreferrer",

      }, "\uD83D\uDD0D Cerca su Google Immagini")

// ── Timer Component ──
function Timer(props) {
  var t = props.timer;
  var pct = t.total > 0 ? t.remaining / t.total : 0;
  var mins = String(Math.floor(t.remaining / 60)).padStart(2, "0");
  var secs = String(t.remaining % 60).padStart(2, "0");
  var presets = [30, 45, 60, 90, 120, 180];
  var radius = 54; var circ = 2 * Math.PI * radius;
  var strokeColor = t.remaining === 0 ? "#e74c3c" : t.remaining <= 5 ? "#f39c12" : "#00e676";
  var statusText = t.remaining === 0 ? "TEMPO!" : t.running ? "IN CORSO" : "PRONTO";

  return e("div", { style: { textAlign: "center", padding: "20px 0" } },
    e("svg", { width: 160, height: 160, viewBox: "0 0 130 130", style: { display: "block", margin: "0 auto" } },
      e("circle", { cx: 65, cy: 65, r: radius, fill: "none", stroke: "#1a1a2e", strokeWidth: 8 }),
      e("circle", {
        cx: 65, cy: 65, r: radius, fill: "none", stroke: strokeColor, strokeWidth: 8, strokeLinecap: "round",
        strokeDasharray: circ, strokeDashoffset: circ * (1 - pct),
        transform: "rotate(-90 65 65)",
        style: { transition: "stroke-dashoffset 0.4s linear, stroke 0.3s" }
      }),
      e("text", { x: 65, y: 62, textAnchor: "middle", fill: "#e0e0e0", fontSize: 28, fontFamily: "'JetBrains Mono', monospace", fontWeight: 700 }, mins + ":" + secs),
      e("text", { x: 65, y: 80, textAnchor: "middle", fill: "#888", fontSize: 10 }, statusText)
    ),
    e("div", { style: { display: "flex", gap: 8, justifyContent: "center", marginTop: 16 } },
      !t.running
        ? e("button", { onClick: t.start, style: btnStyle("#00e676", "#000") }, "\u25B6 Avvia")
        : e("button", { onClick: t.pause, style: btnStyle("#f39c12", "#000") }, "\u23F8 Pausa"),
      e("button", { onClick: t.reset, style: btnStyle("#444", "#fff") }, "\u21BA Reset")
    ),
    e("div", { style: { display: "flex", gap: 6, justifyContent: "center", marginTop: 12, flexWrap: "wrap" } },
      presets.map(function(s) {
        var label = s < 60 ? s + "s" : (s / 60) + "m";
        return e("button", {
          key: s, onClick: function() { t.setTime(s); },
          style: Object.assign({}, chipStyle, {
            background: t.total === s ? "#00e676" : "#1a1a2e",
            color: t.total === s ? "#000" : "#aaa",
            fontWeight: t.total === s ? 700 : 400
          })
        }, label);
      })
    )
  );
}

// ── Exercise Manager ──
function ExerciseManager(props) {
  var day = props.day, data = props.data, setData = props.setData;
  var _s = useState(""), newExName = _s[0], setNewExName = _s[1];
  var _si = useState(""), newExImg = _si[0], setNewExImg = _si[1];
  var _showImg = useState(false), showImgField = _showImg[0], setShowImgField = _showImg[1];
  var _preview = useState(null), preview = _preview[0], setPreview = _preview[1];
  var exercises = data.days[day].exercises;

  function addExercise() {
    var name = newExName.trim();
    if (!name) return;
    var updated = JSON.parse(JSON.stringify(data));
    updated.days[day].exercises.push({ name: name, image: newExImg.trim() });
    setData(updated); saveData(updated);
    setNewExName(""); setNewExImg(""); setShowImgField(false);
  }

    setData(updated); saveData(updated);

  return e("div", { style: { marginBottom: 24 } },
    e("input", {
      value: data.days[day].name, onChange: function(ev) { renameDay(ev.target.value); },
      style: Object.assign({}, inputStyle, { fontWeight: 700, fontSize: 16, marginBottom: 8, color: "#00e676", background: "transparent", border: "none", borderBottom: "1px solid #333", borderRadius: 0, padding: "4px 0", width: "100%" })

        e("button", { className: "img-btn", onClick: (function(oo) { return function() {

          else { window.open("https://www.google.com/search?tbm=isch&q=" + encodeURIComponent(oo.name + " esercizio palestra"), "_blank"); }
        }; })(o) }, "\uD83D\uDCF7"),
        e("span", { style: { flex: 1, color: "#ccc", fontSize: 14 } }, o.name),
        e("button", { onClick: function() { removeExercise(i); }, style: { background: "none", border: "none", color: "#e74c3c", cursor: "pointer", fontSize: 16, padding: 4 } }, "\u2715")
      );
    }),
    e("div", { style: { display: "flex", gap: 8, marginTop: 8 } },
      e("input", {
        placeholder: "Nuovo esercizio...", value: newExName,
        onChange: function(ev) { setNewExName(ev.target.value); },

        style: Object.assign({}, inputStyle, { flex: 1 })
      }),
      e("button", { onClick: function() { setShowImgField(!showImgField); }, style: Object.assign({}, chipStyle, { fontSize: 14, padding: "6px 10px", color: showImgField ? "#00e676" : "#666", border: showImgField ? "1px solid #00e676" : "1px solid #333" }) }, "\uD83D\uDCF7"),
      e("button", { onClick: addExercise, style: btnStyle("#00e676", "#000") }, "+")
    ),
    showImgField ? e("input", {
      placeholder: "URL immagine (opzionale)", value: newExImg,
      onChange: function(ev) { setNewExImg(ev.target.value); },
      style: Object.assign({}, inputStyle, { width: "100%", marginTop: 6, fontSize: 12 })

    preview ? e(ImageOverlay, { src: preview.src, title: preview.title, onClose: function() { setPreview(null); } }) : null
  );

// ── Workout Session ──
function WorkoutSession(props) {
  var day = props.day, data = props.data, setData = props.setData, timer = props.timer, onSave = props.onSave;
  var exercises = data.days[day] ? data.days[day].exercises : [];
  var DRAFT_KEY = "gym-tracker-draft-" + day;

  // Load draft from localStorage on mount or day change
  function loadDraft() {
    try {
      var raw = localStorage.getItem(DRAFT_KEY);
      if (raw) {
        var draft = JSON.parse(raw);
        // Check if draft has any actual data
        var hasData = false;
        Object.keys(draft).forEach(function(k) {
          if (draft[k] && draft[k].length > 0) {
            draft[k].forEach(function(s) {
              if (s.kg || s.note) hasData = true;
            });
          }
        });
        if (hasData) return draft;
      }
    } catch(ex) {}
    return {};
  }

  var _s = useState(loadDraft), sets = _s[0], setSets = _s[1];
  var _preview = useState(null), preview = _preview[0], setPreview = _preview[1];
  var _draftNotice = useState(function() {
    try {
      var raw = localStorage.getItem(DRAFT_KEY);

              e("span", { style: { fontSize: 10, color: "#666" } },
                syncMsg || (syncStatus === "synced" ? "Drive \u2713" : syncStatus === "error" ? "Errore" : "...")
              )
            )
      )
    ),

    // Day selector
    showDaySelector ? e("div", { style: { display: "flex", gap: 8, padding: "12px 16px" } },
      ["A", "B", "C"].map(function(d) {
        return e("button", {
          key: d, onClick: function() { setActiveDay(d); },
          style: {
            flex: 1, padding: "10px 0", borderRadius: 10,
            border: activeDay === d ? "2px solid #00e676" : "1px solid #222",
            background: activeDay === d ? "rgba(0,230,118,0.07)" : "#111119",
            color: activeDay === d ? "#00e676" : "#666",
            fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
            transition: "all 0.2s"
          }
        }, data.days[d].name);
      })
    ) : null,

    // Content
    e("div", { style: { flex: 1, padding: "0 16px 100px", overflowY: "auto", paddingTop: showDaySelector ? 0 : 16 } }, content),

    // Bottom Nav
    e("div", {
      style: {
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
        width: "100%", maxWidth: 480, display: "flex",
        background: "#0d0d15", borderTop: "1px solid #1a1a2e",
        padding: "6px 0 env(safe-area-inset-bottom, 8px)", zIndex: 100
      }
    },
      TABS.map(function(t) {
        return e("button", {
          key: t.id, onClick: function() { setTab(t.id); },
          style: {
            flex: 1, background: "none", border: "none", padding: "10px 0 6px",
            cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
            color: tab === t.id ? "#00e676" : "#555", transition: "color 0.2s", fontFamily: "inherit"
          }
        },
          e("span", { style: { fontSize: 18 } }, t.icon),
          e("span", { style: { fontSize: 9, fontWeight: tab === t.id ? 700 : 400 } }, t.label)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(e(GymTracker));
</script>
</body>
</html>
